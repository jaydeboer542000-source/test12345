<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kapsalon Milano — Wijchen · demo-ontwerp</title>
<meta name="description" content="Demo-ontwerp voor Kapsalon Milano, Wijchen.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23D8222A'/%3E%3C/svg%3E">
<style>
/* ════════════════════════════════════════════════════════════
   KAPSALON MILANO — schone start (2026-07-03, opdracht Jay):
   ALLEEN de header-animatie. De volledige logo-video speelt
   frame voor frame af op de scrollbeweging — vooruit én terug.
   Geen andere scènes, geen fades, geen stipjes, geen stuur.
   Vanaf hier bouwen we sectie voor sectie op, op Jays aanwijzing.
   ════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{background:#e9e9e9}

/* de scroll-ruimte: hoe hoger, hoe fijner je door de video spoelt */
#header-ruimte{height:400svh}

/* het plakkende beeld: blijft staan terwijl jij de film scrubt */
#header-plak{position:sticky;top:0;height:100svh;overflow:hidden}
#header-plak video{position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;pointer-events:none;
  background:radial-gradient(circle at 50% 45%, #f6f6f6, #dcdcdc)}
/* staand scherm: liggende video passend tonen, nooit hard bijsnijden */
@media (max-aspect-ratio: 1/1){
  #header-plak video{object-fit:contain}
}

/* wie geen beweging wil: gewoon het stilstaande logo-beeld */
@media (prefers-reduced-motion: reduce){
  #header-ruimte{height:100svh}
}
</style>
</head>
<body>

<h1 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap">Kapsalon Milano — kapper in Wijchen</h1>

<div id="header-ruimte">
  <div id="header-plak">
    <video id="logo-intro" muted playsinline preload="auto"
           poster="assets/logo-intro-poster.jpg" src="assets/logo-intro.mp4"
           aria-label="Kapsalon Milano"></video>
  </div>
</div>

<script>
(function(){
  'use strict';
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var video  = document.getElementById('logo-intro');
  var ruimte = document.getElementById('header-ruimte');
  var duur   = 0;

  video.addEventListener('loadedmetadata', function(){
    duur = video.duration || 0;
    try { video.currentTime = 0.001; } catch(e){}
    tik();
  });
  try { video.load(); } catch(e){}

  /* scrollpositie → videotijd. Pure functie: zelfde plek = zelfde beeld,
     dus terugscrollen spoelt exact terug. Geen timers, geen autoplay. */
  var doelTijd = 0, bezig = false;
  function tik(){
    if (!duur) return;
    var maxScroll = ruimte.offsetHeight - window.innerHeight;
    if (maxScroll <= 0) return;
    var p = Math.min(Math.max(window.scrollY / maxScroll, 0), 1);
    doelTijd = p * Math.max(duur - 0.05, 0);
    if (!bezig) zet();
  }
  function zet(){
    if (Math.abs(video.currentTime - doelTijd) > 0.02) {
      bezig = true;
      try { video.currentTime = doelTijd; } catch(e){}
      requestAnimationFrame(zet);
    } else {
      bezig = false;
    }
  }
  window.addEventListener('scroll', tik, { passive: true });
  window.addEventListener('resize', tik);
  tik();
})();
</script>
</body>
</html>
