<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>reel render</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..560&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;background:#05080f;display:grid;place-items:center;height:100%}
  canvas{width:360px;height:640px;box-shadow:0 0 0 1px #222}
</style>
</head>
<body>
<canvas id="c" width="1080" height="1920"></canvas>
<script>
const W=1080, H=1920;
const cv=document.getElementById('c'), x=cv.getContext('2d');

const WORLDS=[
  {bg:'world_water.webp',  watch:'watch_aqua_n.webp',  glow:'#4db6ff', mood:'aqua',    kicker:'CHAPTER I · AQUA',      title:'Aqua Nocturne',  sub:'Born in the deep. Rose gold, sapphire glass.'},
  {bg:'world_dark.webp',   watch:'watch_abyss_n.webp', glow:'#3a7bff', mood:'abyss',   kicker:'CHAPTER II · ABYSS',    title:'Midnight Abyss', sub:'Sapphire. Deep, cool and still.'},
  {bg:'world_purple.webp', watch:'watch_purple_n.webp',glow:'#b06cff', mood:'crystal', kicker:'CHAPTER III · AMETHYST',title:'Violet Aurora',  sub:'Crystal and mystery.'},
  {bg:'world_green.webp',  watch:'watch_green_n.webp', glow:'#4fd99a', mood:'verde',   kicker:'CHAPTER IV · VERDE',    title:'Emerald Wild',   sub:'Alive, raw, natural.'},
];

// per-world ambient particle fields (match the live engine: sweep/fog/spark/mote)
const FIELD={sparks:[],motes:[]};
(function initFields(){
  for(let i=0;i<32;i++) FIELD.sparks.push({x:Math.random()*W, y:60+Math.random()*(H*0.9), r:1.4+Math.random()*2.6, sp:0.6+Math.random()*1.5, ph:Math.random()*6.28});
  for(let i=0;i<36;i++) FIELD.motes.push({x:Math.random()*W, y0:Math.random()*H, vy:16+Math.random()*36, r:1.4+Math.random()*2.4, a:0.4+Math.random()*0.5, ph:Math.random()*6.28});
})();

// ambient layer drawn behind the glow+watch (screen-blend like the engine)
function drawAmbient(mood,t){
  x.save(); x.globalCompositeOperation='screen';
  if(mood==='aqua'){
    const off=Math.sin(t*0.5)*W*0.28;
    const g=x.createLinearGradient(W*0.15+off,0, W*0.55+off,H);
    g.addColorStop(0,'rgba(150,222,255,0)'); g.addColorStop(.5,'rgba(150,222,255,0.12)'); g.addColorStop(1,'rgba(150,222,255,0)');
    x.fillStyle=g; x.fillRect(0,0,W,H);
  } else if(mood==='abyss'){
    const fx=W*0.5+Math.sin(t*0.14)*W*0.06, fy=H*0.6+Math.cos(t*0.11)*H*0.03, r=W*0.55*(1+0.07*Math.sin(t*0.2));
    const g=x.createRadialGradient(fx,fy,0,fx,fy,r);
    g.addColorStop(0,'rgba(45,85,160,0.18)'); g.addColorStop(1,'rgba(45,85,160,0)');
    x.fillStyle=g; x.beginPath(); x.arc(fx,fy,r,0,7); x.fill();
  } else if(mood==='crystal'){
    for(const s of FIELD.sparks){
      const a=Math.pow(Math.max(0,Math.sin(t*s.sp+s.ph)),3); if(a<0.03) continue;
      x.globalAlpha=a; const R=s.r*4.5;
      const g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,R);
      g.addColorStop(0,'rgba(255,255,255,0.95)'); g.addColorStop(.35,'rgba(206,160,255,0.7)'); g.addColorStop(1,'rgba(206,160,255,0)');
      x.fillStyle=g; x.beginPath(); x.arc(s.x,s.y,R,0,7); x.fill();
    }
    x.globalAlpha=1;
  } else if(mood==='verde'){
    for(const m of FIELD.motes){
      const yy=(m.y0 + t*m.vy) % (H+60);
      x.globalAlpha=m.a*(0.55+0.45*Math.sin(t*0.7+m.ph)); const R=m.r*3;
      const g=x.createRadialGradient(m.x,yy,0,m.x,yy,R);
      g.addColorStop(0,'rgba(180,255,205,0.85)'); g.addColorStop(1,'rgba(180,255,205,0)');
      x.fillStyle=g; x.beginPath(); x.arc(m.x,yy,R,0,7); x.fill();
    }
    x.globalAlpha=1;
  }
  x.restore();
}

const imgs={};
function load(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function loadAll(){
  const all=[];
  WORLDS.forEach(w=>{all.push(w.bg,w.watch);});
  for(const s of [...new Set(all)]) imgs[s]=await load(s);
}

/* ---------- helpers ---------- */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
function seg(t,a,b){return clamp((t-a)/(b-a),0,1);}              // 0..1 over [a,b]
const easeOut=t=>1-Math.pow(1-t,3);
const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
function fade(t,a,b,c,d){ // ramp up a->b, hold, ramp down c->d
  return Math.min(seg(t,a,b),1-seg(t,c,d));
}
function drawCover(img,dx,dy,dw,dh,zoom=1){
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const s=Math.max(dw/iw,dh/ih)*zoom;
  const w=iw*s,h=ih*s;
  x.drawImage(img, dx+(dw-w)/2, dy+(dh-h)/2, w, h);
}
function drawWatch(img,cx,cy,targetH){
  const s=targetH/img.naturalHeight;
  const w=img.naturalWidth*s, h=targetH;
  x.drawImage(img, cx-w/2, cy-h/2, w, h);
}
function roundRect(cx0,cy0,w,h,r){
  x.beginPath();
  x.moveTo(cx0+r,cy0);
  x.arcTo(cx0+w,cy0,cx0+w,cy0+h,r);
  x.arcTo(cx0+w,cy0+h,cx0,cy0+h,r);
  x.arcTo(cx0,cy0+h,cx0,cy0,r);
  x.arcTo(cx0,cy0,cx0+w,cy0,r);
  x.closePath();
}

/* ---------- scene pieces ---------- */
const WATCH_CY=760, WATCH_H=940;

function vignette(){
  const g=x.createRadialGradient(W/2,H*0.42,200, W/2,H*0.5,1200);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.45)');
  x.fillStyle=g; x.fillRect(0,0,W,H);
}
function bottomScrim(){
  const g=x.createLinearGradient(0,H*0.45,0,H);
  g.addColorStop(0,'rgba(4,8,16,0)');
  g.addColorStop(.55,'rgba(4,8,16,0.55)');
  g.addColorStop(1,'rgba(4,8,16,0.92)');
  x.fillStyle=g; x.fillRect(0,0,W,H);
}

// one world, translated by xOff px. t = global time (for float). introRise applies to world 0 reveal.
function drawWorld(i,xOff,t,titleA,introRise=0){
  const w=WORLDS[i];
  x.save();
  x.translate(xOff,0);
  // bg with slow zoom
  const zoom=1.06+0.02*Math.sin(t*0.25);
  drawCover(imgs[w.bg],0,0,W,H,zoom);
  // ambient sfeerlaag (twinkels/stof/sweep/mist) — de "beleving" van de live site
  drawAmbient(w.mood,t);
  // glow behind watch
  const floatY=Math.sin(t*1.7+i)*16;
  const cy=WATCH_CY+floatY+introRise;
  const pulse=1+0.05*Math.sin(t*1.3+i);
  const gr=x.createRadialGradient(W/2,cy,40, W/2,cy,520*pulse);
  gr.addColorStop(0,w.glow+'cc');
  gr.addColorStop(.35,w.glow+'66');
  gr.addColorStop(1,w.glow+'00');
  x.globalCompositeOperation='screen';
  x.globalAlpha=0.55;
  x.fillStyle=gr; x.beginPath(); x.arc(W/2,cy,520*pulse,0,7); x.fill();
  x.globalAlpha=1; x.globalCompositeOperation='source-over';
  // watch
  drawWatch(imgs[w.watch],W/2,cy,WATCH_H);
  x.restore();

  // scrim + title (title also shifts with xOff, lighter)
  if(titleA>0){
    x.save();
    x.translate(xOff,0);
    x.globalAlpha=titleA;
    // kicker (light for readability across all worlds)
    x.fillStyle='rgba(233,242,255,.88)';
    x.font='600 28px Inter, sans-serif';
    x.globalAlpha=titleA*0.92;
    x.fillText(spaced(w.kicker), 84, 1498);
    // title
    x.globalAlpha=titleA;
    x.fillStyle='#eef4ff';
    x.font='540 96px Fraunces, Georgia, serif';
    x.fillText(w.title, 80, 1610);
    // sub
    x.globalAlpha=titleA*0.82;
    x.fillStyle='#dbe6f5';
    x.font='400 36px Inter, sans-serif';
    x.fillText(w.sub, 84, 1672);
    x.restore();
  }
}
function spaced(s){return s.split('').join(' ');} // light letter-spacing

/* dead/boring section */
function drawDead(){
  x.fillStyle='#eef1f5'; x.fillRect(0,0,W,H);
  // header bar
  x.fillStyle='#dde2e9'; x.fillRect(0,0,W,120);
  x.fillStyle='#c2c9d4'; roundRect(80,46,180,28,14); x.fill();
  // big gray product placeholder
  x.fillStyle='#d8dde5'; roundRect(300,360,480,480,24); x.fill();
  x.fillStyle='#c7ccd6'; x.font='600 40px Inter, sans-serif';
  x.fillText('IMG', 470, 620);
  // title + lines
  x.fillStyle='#aab2c0'; roundRect(300,900,470,40,8); x.fill();
  x.fillStyle='#cfd5de'; roundRect(300,968,470,22,6); x.fill();
  x.fillStyle='#cfd5de'; roundRect(300,1006,380,22,6); x.fill();
  // dull button
  x.fillStyle='#9aa3b2'; roundRect(300,1090,220,72,10); x.fill();
  x.fillStyle='#eef1f5'; x.font='600 30px Inter, sans-serif';
  x.fillText('Buy now', 340, 1135);
}

/* maker mark top-left */
function makerMark(a=1){
  x.save(); x.globalAlpha=a;
  x.fillStyle='#fff'; x.font='430 40px Fraunces, Georgia, serif';
  x.fillText('Jay de Boer', 80, 110);
  x.fillStyle='rgba(255,255,255,.7)'; x.font='600 22px Inter, sans-serif';
  x.fillText(spaced('•  CINEMATIC WEB DESIGN'), 360, 104);
  x.restore();
}

/* center on-screen caption */
function caption(text,a,size=64,y=1180){
  if(a<=0)return;
  x.save(); x.globalAlpha=a;
  x.textAlign='center';
  x.font=`600 ${size}px Inter, sans-serif`;
  x.shadowColor='rgba(0,0,0,.6)'; x.shadowBlur=24; x.shadowOffsetY=2;
  x.fillStyle='#fff';
  x.fillText(text, W/2, y);
  x.restore(); x.textAlign='left';
}

/* pill (offer) bottom */
function pill(a=1){
  if(a<=0)return;
  x.save(); x.globalAlpha=a;
  x.textAlign='center';
  const w=560,h=110,cx=W/2,cy=1760;
  x.fillStyle='#fff'; roundRect(cx-w/2,cy-h/2,w,h,55); x.fill();
  x.fillStyle='#0a1422'; x.font='600 38px Inter, sans-serif';
  x.fillText('Get the free section  →', cx, cy+13);
  x.restore(); x.textAlign='left';
}

/* ---------- master timeline ---------- */
const T={
  deadEnd:2.5, sweepEnd:3.2,
  aquaHold:8.2,                  // aqua lands ~5s
  s1:[8.2,8.5],                  // fast swipe -> abyss, holds ~5s (to 13.5)
  s2:[13.5,13.8],                // fast swipe -> violet, holds ~5s (to 18.8)
  s3:[18.8,19.1],                // fast swipe -> emerald, holds ~5s to end
  end:24.5
};
const DUR=24.5;

function render(t){
  x.clearRect(0,0,W,H);
  x.fillStyle='#05080f'; x.fillRect(0,0,W,H);

  if(t < T.sweepEnd){
    // dead -> sweep reveal of aqua
    const sweep=seg(t,T.deadEnd,T.sweepEnd);        // 0..1
    // aqua world building during reveal (watch rises in ~1.9s, then floats)
    const introRise=lerp(120,0,easeOut(seg(t,T.deadEnd,T.sweepEnd+1.2)));
    // draw dead full
    drawDead();
    if(sweep>0){
      const edge=easeInOut(sweep)*W*1.15;
      x.save();
      x.beginPath(); x.rect(0,0,edge,H); x.clip();
      drawWorld(0,0,t,0,introRise);
      bottomScrim();
      x.restore();
      // glare band
      const gx=edge;
      const gw=180;
      const lg=x.createLinearGradient(gx-gw,0,gx+gw*0.4,0);
      lg.addColorStop(0,'rgba(255,255,255,0)');
      lg.addColorStop(.5,'rgba(235,245,255,0.85)');
      lg.addColorStop(1,'rgba(255,255,255,0)');
      x.save(); x.globalCompositeOperation='screen';
      x.fillStyle=lg; x.fillRect(gx-gw,0,gw*1.4,H); x.restore();
    }
    vignette();
    caption("don't skip the boring part", fade(t,0.3,0.8,2.05,2.45), 60, 1150);
  }
  else if(t < T.aquaHold){
    drawWorld(0,0,t, seg(t,T.sweepEnd+0.15,T.sweepEnd+0.9), lerp(120,0,easeOut(seg(t,T.deadEnd,T.sweepEnd+1.2))));
    bottomScrim(); vignette();
    caption("same section. alive.", fade(t,3.5,4.0,7.4,7.9), 64, 1180);
  }
  else{
    // fast swipes between worlds; long holds so each lands. ends on the LIVING
    // emerald world with the offer (no fake browser-frame pullback).
    let drawn=false;
    const pairs=[ [0,1,T.s1], [1,2,T.s2], [2,3,T.s3] ];
    for(const [a,b,s] of pairs){
      if(t>=s[0] && t<s[1]){
        const p=easeInOut(seg(t,s[0],s[1]));
        drawWorld(a,-p*W,t, 1-p);
        drawWorld(b,(1-p)*W,t, p);
        drawn=true; break;
      }
    }
    if(!drawn){
      let i=3;
      if(t>=T.sweepEnd && t<T.s1[0]) i=0;
      else if(t>=T.s1[1] && t<T.s2[0]) i=1;
      else if(t>=T.s2[1] && t<T.s3[0]) i=2;
      else i=3;
      // on the final world, fade its title out as the end-card fades in
      let titleA=1;
      if(i===3) titleA=1-seg(t,20.9,21.5);
      drawWorld(i,0,t,titleA);
    }
    bottomScrim(); vignette();
    // mid caption as the 4th world lands
    caption("one section.  four worlds.", fade(t,19.2,19.7,20.7,21.1), 60, 1180);
    // end card over the held, still-floating emerald world
    const ea=seg(t,21.3,22.0);
    if(ea>0){
      x.save(); x.globalAlpha=ea; x.textAlign='center';
      x.shadowColor='rgba(0,0,0,.6)'; x.shadowBlur=22;
      x.fillStyle='rgba(255,255,255,.9)'; x.font='500 42px Inter, sans-serif';
      x.fillText('a real website — built by hand', W/2, 1430);
      x.fillStyle='#fff'; x.font='600 64px Inter, sans-serif';
      x.fillText('Free cinematic section', W/2, 1558);
      x.font='500 42px Inter, sans-serif'; x.fillStyle='rgba(255,255,255,.9)';
      x.fillText('link in bio  ·  @jay.webdesign', W/2, 1628);
      x.restore(); x.textAlign='left';
    }
  }
}

/* ---------- public API ---------- */
let ready=false;
async function ensure(){ if(ready)return; await loadAll(); try{await document.fonts.ready;}catch(e){} ready=true; }

window.__seek=async(t)=>{ await ensure(); render(t); return true; };

window.__renderReel=async()=>{
  await ensure();
  // warm fonts by drawing once
  render(0);
  const stream=cv.captureStream(60);
  const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9'
             : MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8'
             : 'video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:12_000_000});
  const chunks=[];
  rec.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
  const done=new Promise(r=>{ rec.onstop=r; });
  rec.start();
  const start=performance.now();
  await new Promise(res=>{
    function frame(now){
      const t=(now-start)/1000;
      if(t>=DUR){ render(DUR-0.001); res(); return; }
      render(t);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  });
  rec.stop();
  await done;
  const blob=new Blob(chunks,{type:'video/webm'});
  const buf=await blob.arrayBuffer();
  let bin=''; const bytes=new Uint8Array(buf);
  for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
  return btoa(bin);
};
window.__mime='webm';
</script>
</body>
</html>
