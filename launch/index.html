<script>

<!-- DE MACHINE (looks) -->

<!-- DE LANDING-LAAG (offer bovenop de sectie) -->

</head>
<body>
  <!-- de cinematische sectie (eye candy) -->
  <div class="carousel" id="carousel"><div class="track" id="track"></div></div>
  <div class="scrim"></div>
  <div class="brand" id="brand"></div>
  <div class="arrow prev" id="prev">‹</div>
  <div class="arrow next" id="next">›</div>
  <div class="hint">Swipe / ← →</div>
  <div class="dots" id="dots"></div>

  <!-- ===== LANDING-OVERLAY (de funnel) ===== -->
  <!-- maker-mark linksboven: een persoon, geen horlogemerk -->
  <div class="makermark">
    <span class="mm-name">Jay de Boer</span>
    <span class="mm-dot">•</span>
    <span class="mm-sub">Cinematic Web Design</span>
  </div>
  <!-- horloge blijft demo, geen echt merk -->
  <div class="demo-tag">AURELIAN — fictional demo brand</div>

  <!-- offer-blok linksonder: één kop, één knop, één taak -->
  <!-- vaste CTA-balk: één knop op elke scene (opent het paneel). Op de laatste wereld komt er een pitch-regel boven. -->
  <div class="cta-bar">
    <button class="cta-pill" id="openPanel" type="button">Get the free section →</button>
  </div>

  <!-- ===== SIGNUP-PANEEL (opent op knop; carousel blijft heel) ===== -->
  <div class="panel-backdrop" id="panelBackdrop" hidden>
    <div class="panel-card" role="dialog" aria-modal="true" aria-label="Get the free cinematic section">
      <button class="panel-close" id="closePanel" type="button" aria-label="Close">×</button>
      <p class="panel-mark">Jay de Boer • Cinematic Web Design</p>
      <h2 class="panel-title">Your free cinematic section</h2>
      <p class="panel-value">Drop it into your own site, swap in your product — no code needed. Yours to keep.</p>
      <!-- MailerLite-formulier (vooraf geladen, herstijld via landing.css) -->
      <div class="ml-embedded" data-form="KyKPjd"></div>
      <p class="panel-note">No spam, ever.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="engine.js"></script>
  <script src="landing.js"></script>
</body>
</html>
