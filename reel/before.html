<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080, initial-scale=1" />
<title>before</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;background:#e6e9ec}
  body{font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}

  /* full-bleed generic website SECTION (1080x1920), no chrome/URL/commerce */
  .site{position:relative;width:1080px;height:1920px;background:#e6e9ec;overflow:hidden}

  /* dull top nav, pinned to top edge */
  .nav{position:absolute;top:0;left:0;right:0;height:112px;background:#dde1e5;
       border-bottom:1px solid #cfd4d9;display:flex;align-items:center;
       justify-content:space-between;padding:0 56px}
  .nav .mark{font-size:26px;letter-spacing:6px;color:#9097a0;font-weight:700}
  .nav .links{display:flex;gap:40px;font-size:20px;color:#aab0b6;letter-spacing:1px}

  /* hero: watch locked to frame center for the match-cut */
  .hero{position:absolute;left:50%;top:50%;
        transform:translate(-50%,-50%) translateY(28px);
        width:1080px;text-align:center}
  .eyebrow{font-size:18px;letter-spacing:5px;color:#aab0b6;margin-bottom:22px}
  .tile{width:560px;margin:0 auto;background:#eceef1;border:1px solid #dde1e5;
        border-radius:10px;padding:30px}
  .tile img{width:100%;height:auto;display:block;filter:saturate(.82) brightness(1.02)}
  .hero h1{font-size:46px;font-weight:700;color:#3a3f45;letter-spacing:1px;margin:34px 0 14px}
  .hero .sub{font-size:22px;color:#898f96}

  /* dull bottom block (spec row + footer), pinned to bottom edge */
  .bottom{position:absolute;left:0;right:0;bottom:0}
  .specs{display:flex;justify-content:center;gap:64px;padding:40px 56px 36px;
         background:#e6e9ec;border-top:1px solid #d9dde1}
  .col{width:220px;text-align:center}
  .col .k{font-size:16px;letter-spacing:3px;color:#a7adb4;margin-bottom:16px}
  .col .bar{height:10px;border-radius:5px;background:#cfd4d9;margin:0 auto 10px}
  .col .bar.w{width:80%}
  .col .bar.n{width:55%}
  .foot{height:96px;background:#dde1e5;border-top:1px solid #cfd4d9;
        display:flex;align-items:center;justify-content:space-between;
        padding:0 56px;font-size:18px;color:#9097a0}
  .foot .fl{display:flex;gap:34px;color:#a7adb4}
</style>
</head>
<body>
  <div class="site">
    <div class="nav">
      <span class="mark">AURELIAN</span>
      <span class="links"><span>Home</span><span>Watches</span><span>About</span><span>Contact</span></span>
    </div>

    <div class="hero">
      <div class="eyebrow">NEW COLLECTION</div>
      <div class="tile"><img src="watch_clean.jpg" alt="watch" /></div>
      <h1>Our Watch</h1>
      <div class="sub">A quality timepiece for every day.</div>
    </div>

    <div class="bottom">
      <div class="specs">
        <div class="col"><div class="k">MOVEMENT</div><div class="bar w"></div><div class="bar n"></div></div>
        <div class="col"><div class="k">CASE</div><div class="bar w"></div><div class="bar n"></div></div>
        <div class="col"><div class="k">STRAP</div><div class="bar w"></div><div class="bar n"></div></div>
      </div>
      <div class="foot">
        <span>&copy; 2026 Aurelian</span>
        <span class="fl"><span>Privacy</span><span>Terms</span></span>
      </div>
    </div>
  </div>
</body>
</html>
